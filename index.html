    }).addTo(map);
    
    // 箭头（深蓝色，与地图区分）
    for(var i=1;i<route.length;i++){
      var a=[(route[i-1][0]+route[i][0])/2,(route[i-1][1]+route[i][1])/2];
      var ang=Math.atan2(route[i][0]-route[i-1][0],route[i][1]-route[i-1][1])*180/Math.PI;
      var ra=L.marker(a,{icon:L.divIcon({
        html:'<div style="transform:rotate('+ang+'deg);font-size:14px;color:#1a237e;text-shadow:0 0 3px rgba(255,255,255,0.8)">&#9654;</div>',
        iconSize:[14,14],className:''
      }),interactive:false}).addTo(map);
      routeArrows.push(ra);
    }
    
    map.fitBounds(currentPolyline.getBounds().pad(0.1));
  } else {
    // 全部显示时，适配所有点
    if(data.length > 0){
      var bounds = L.latLngBounds(data.map(function(d){return [d.lat, d.lon]}));
      map.fitBounds(bounds.pad(0.05));
    }
  }
  
  // 编号标签
  data.forEach(function(d, i){
    if(currentLecturer !== 'all'){
      var ni = L.divIcon({
        html:'<div style="background:rgba(0,0,0,0.6);color:#fff;border-radius:50%;width:16px;height:16px;line-height:16px;text-align:center;font-size:8px;font-weight:bold">'+(i+1)+'</div>',
        iconSize:[16,16],className:''
      });
      var nm = L.marker([d.lat,d.lon+0.2],{icon:ni,interactive:false}).addTo(map);
      numberLabels.push(nm);
    }
  });
}

// 统计信息
function renderStats(){
  if(currentLecturer === 'all'){
    document.getElementById('stat-inst').textContent = '0';
    document.getElementById('stat-weekend').textContent = '0';
    document.getElementById('stat-dist').textContent = '--';
    return;
  }
  var data = teamData[currentLecturer].markers;
  var td = teamData[currentLecturer];
  
  document.getElementById('stat-inst').textContent = data.length;
  document.getElementById('stat-weekend').textContent = data.filter(function(d){return d.isWeekend}).length;
  document.getElementById('stat-dist').textContent = td ? td.total_dist : '--';
}

// 机构列表
function renderList(){
  if(currentLecturer === 'all'){
    document.getElementById('inst-list').innerHTML = '';
    return;
  }
  var data = teamData[currentLecturer].markers;
  var html = '';
  
  // 按路线顺序排序（选团队时）或按收益排序（全部时）
  if(currentLecturer !== 'all'){
    // 已经是路线顺序
  } else {
    data = data.slice().sort(function(a,b){return b.score - a.score});
  }
  
  data.forEach(function(d, i){
    var star = d.isWeekend ? '&#11088; ' : '';
    var dayType = d.isWeekend ? '周末' : '工作日';
    
    // 机动组：侧边栏显示来源和距离，不显示收益
    var rightHtml = '';
    if(d.original_team){
      rightHtml = '<div class="badge-mobile">&#128260; '+d.original_team+'</div>' +
                  '<div class="badge">'+d.date+' '+d.wd+'</div>' +
                  '<div class="dist">'+d.dist_from_origin+'km</div>';
    } else {
      rightHtml = '<div class="badge">'+d.date+' '+d.wd+'</div>';
    }
    
    html += '<div class="inst-item" onclick="focusMarker('+i+')" data-idx="'+i+'">' +
      '<span class="num">'+(i+1)+'</span>' +
      '<div class="info"><div class="name">'+star+d.name+'</div>' +
      '<div class="meta">'+d.city+' &#183; '+d.leader+' &#183; '+d.lecturer+'</div></div>' +
      '<div class="right">'+rightHtml+'</div></div>';
  });
  document.getElementById('inst-list').innerHTML = html;
}

// 清除机动组箭头
function clearMobileArrows(){
  mobileArrows.forEach(function(layer){map.removeLayer(layer)});
  mobileArrows = [];
}

// 画机动组来源箭头
function drawMobileArrow(fromLat, fromLon, toLat, toLon, label){
  // 虚线来源线
  var line = L.polyline([[fromLat, fromLon], [toLat, toLon]], {
    color: '#f39c12', weight: 2, opacity: 0.7, dashArray: '6,8'
  }).addTo(map);
  mobileArrows.push(line);
  
  // 起点圆点
  var dot = L.circleMarker([fromLat, fromLon], {
    radius: 5, color: '#f39c12', fillColor: '#f39c12', fillOpacity: 0.6, weight: 2
  }).addTo(map);
  mobileArrows.push(dot);
  
  // 箭头
  var ang = Math.atan2(toLat - fromLat, toLon - fromLon) * 180 / Math.PI;
  var mid = [(fromLat + toLat) / 2, (fromLon + toLon) / 2];
  var arrow = L.marker(mid, {icon: L.divIcon({
    html: '<div style="transform:rotate('+ang+'deg);font-size:16px;color:#f39c12;text-shadow:0 0 4px #fff">&#10132;</div>',
    iconSize: [16, 16], className: ''
  }), interactive: false}).addTo(map);
  mobileArrows.push(arrow);
  
  // 标签
  var lbl = L.marker(mid, {icon: L.divIcon({
    html: '<div style="background:rgba(255,255,255,0.9);padding:2px 6px;border-radius:4px;font-size:11px;font-weight:bold;color:#f39c12;border:1px solid #f39c12;white-space:nowrap">&#128260; '+label+'</div>',
    iconSize: [0, 0], className: ''
  }), interactive: false}).addTo(map);
  mobileArrows.push(lbl);
}

// 跳转到标记
function focusMarker(idx){
  if(idx < markers.length){
    // 清除旧箭头
    clearMobileArrows();
    
    markers[idx].openPopup();
    map.panTo(markers[idx].getLatLng());
    document.querySelectorAll('.inst-item').forEach(function(el){
      el.classList.toggle('active', parseInt(el.dataset.idx)===idx);
    });
    
    // 机动组：画来源箭头
    var md = (currentLecturer === 'all') ? allMarkers : teamData[currentLecturer].markers;
    if(idx < md.length && md[idx].original_team){
      drawMobileArrow(md[idx].origin_lat, md[idx].origin_lon, md[idx].lat, md[idx].lon, md[idx].original_team);
      // 调整视野包含起点终点
      var bounds = L.latLngBounds([[md[idx].origin_lat, md[idx].origin_lon], [md[idx].lat, md[idx].lon]]);
      map.fitBounds(bounds.pad(0.15));
    }
  }
}

function toggleSidebar(){
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').className = sidebarOpen ? 'open' : '';
  setTimeout(function(){map.invalidateSize()}, 350);
}

// ====== 主逻辑 ======
document.addEventListener('DOMContentLoaded', function(){
  console.log('DOM ready, initializing map...');
  try {
    toggleSidebar();
    renderFilters();
    // 默认不加载任何组，选哪个显示哪个
    console.log('Map ready! Select a team to begin.');
  } catch(e) {
    console.error('Map init error:', e);
    document.getElementById('map').innerHTML = '<div style="padding:40px;font-family:sans-serif;text-align:center"><h2 style="color:red">页面加载异常</h2><p style="color:#999">'+e.message+'</p><p>请按 F12 查看控制台错误详情</p></div>';
  }
});
</script>
