var lecturers = ["徐泼", "李康", "李静", "武磊", "毛顺利", "潘春凯", "白涛", "蔡杰", "郭威", "陈可", "马学东", "马学东、潘春凯、靳鹏程", "高继英", "待定"];

var map = L.map('map').setView([35, 110], 5);
L.tileLayer('https://{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{subdomains:['webrd01','webrd02','webrd03','webrd04'],attribution:'&copy; AutoNavi',maxZoom:18}).addTo(map);

var currentLecturer = 'all';
var sidebarOpen = true;
var markers = [];

// 渲染筛选按钮
function renderFilters(){
  var html = '<button class="filter-btn all active" onclick="selectLecturer(&apos;all&apos;)">&#127760; 全部('+allMarkers.length+')</button>';
  lecturers.forEach(function(l){
    var cnt = teamData[l] ? teamData[l].markers.length : 0;
    html += '<button class="filter-btn" onclick="selectLecturer(this.dataset.lec)" data-lec="'+l+'">'+l+'('+cnt+')</button>';
  });
  document.getElementById('filter-btns').innerHTML = html;
}

function selectLecturer(lec){
  currentLecturer = lec;
  document.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.classList.toggle('active', btn.getAttribute('data-lec')===lec || (lec==='all' && btn.classList.contains('all')));
  });
  renderMap();
  renderStats();
  renderList();
}

var currentPolyline = null;
var routeArrows = [];
var searchResults = null;  // 搜索结果缓存

function renderMap(){
  markers.forEach(function(m){map.removeLayer(m)});
  if(currentPolyline) map.removeLayer(currentPolyline);
  routeArrows.forEach(function(m){map.removeLayer(m)});
  markers = [];
  routeArrows = [];
  
  var data = (currentLecturer === 'all') ? allMarkers : (teamData[currentLecturer] ? teamData[currentLecturer].markers : []);
  var route = (currentLecturer !== 'all' && teamData[currentLecturer]) ? teamData[currentLecturer].route : null;
  
  data.forEach(function(d, i){
    var color, radius, style;
    if(d.isPending){
      color = '#d35400';
      radius = 8;
      style = {radius:radius, fillColor:color, color:'#fff', weight:2.5, fillOpacity:0.85, dashArray:'4,4'};
    } else if(d.isWeekend){
      color = '#c0392b';
      radius = 9;
      style = {radius:radius, fillColor:color, color:'#fff', weight:2.5, fillOpacity:0.95};
    } else {
      color = '#1a5276';
      radius = 7;
      style = {radius:radius, fillColor:color, color:'#fff', weight:2.5, fillOpacity:0.95};
    }
    var m = L.circleMarker([d.lat, d.lon], style).addTo(map);
    m.bindPopup(d.popup);
    markers.push(m);
  });
  
  // 路线（选择具体团队时显示）
  if(route && route.length > 1){
    currentPolyline = L.polyline(route, {
      color: '#1a237e', weight: 3, opacity: 0.7, dashArray: '8,10'
    }).addTo(map);
    
    for(var i=1;i<route.length;i++){
      var mid = [(route[i-1][0]+route[i][0])/2, (route[i-1][1]+route[i][1])/2];
      var ang = Math.atan2(route[i][0]-route[i-1][0], route[i][1]-route[i-1][1])*180/Math.PI;
      var ar = L.marker(mid, {icon: L.divIcon({
        html: '<div style="transform:rotate('+ang+'deg);font-size:16px;color:#1a237e;text-shadow:0 0 6px #fff,0 0 10px rgba(255,255,255,0.9)">&#9654;</div>',
        iconSize: [16, 16], className: ''
      }), interactive: false}).addTo(map);
      routeArrows.push(ar);
    }
    
    map.fitBounds(currentPolyline.getBounds().pad(0.1));
  } else if(data.length > 0){
    var bounds = L.latLngBounds(data.map(function(d){return [d.lat, d.lon]}));
    map.fitBounds(bounds.pad(0.08));
  }
}

function renderStats(){
  var data = (currentLecturer === 'all') ? allMarkers : (teamData[currentLecturer] ? teamData[currentLecturer].markers : []);
  document.getElementById('stat-inst').textContent = data.length;
  document.getElementById('stat-weekend').textContent = data.filter(function(d){return d.isWeekend}).length;
  document.getElementById('stat-pending').textContent = data.filter(function(d){return d.isPending}).length;
}

function renderList(){
  var data = searchResults ? searchResults : ((currentLecturer === 'all') ? allMarkers : (teamData[currentLecturer] ? teamData[currentLecturer].markers : []));
  var html = '';
  
  data.forEach(function(d, i){
    var star = d.isWeekend ? '&#11088; ' : '';
    var pend = d.isPending ? '&#9200; ' : '';
    var badgeClass = d.isPending ? 'badge pending' : 'badge';
    var numClass = d.isPending ? 'num pending' : 'num';
    var nameClass = d.isPending ? 'name pending' : 'name';
    var dayLabel = d.isPending ? '待定' : (d.date+' '+d.wd);
    
    html += '<div class="inst-item" onclick="focusMarker('+i+')" data-idx="'+i+'">' +
      '<span class="'+numClass+'">'+(i+1)+'</span>' +
      '<div class="info"><div class="'+nameClass+'">'+pend+star+d.name+'</div>' +
      '<div class="meta">'+d.city+' &#183; '+d.lecturer+' &#183; '+d.channel_mgr+'</div><div class="members">'+(d.members && d.members != '' ? '👥 '+d.members.substring(0,30)+(d.members.length>30?'...':'') : '')+'</div></div>' +
      '<div class="right"><div class="'+badgeClass+'">'+dayLabel+'</div></div></div>';
  });
  document.getElementById('inst-list').innerHTML = html;
}

function focusMarker(idx){
  if(idx < markers.length){
    markers[idx].openPopup();
    map.panTo(markers[idx].getLatLng());
    document.querySelectorAll('.inst-item').forEach(function(el){
      el.classList.toggle('active', parseInt(el.dataset.idx)===idx);
    });
  }
}

function toggleSidebar(){
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').className = sidebarOpen ? 'open' : '';
  setTimeout(function(){map.invalidateSize()}, 350);
}

// 搜索
function onSearch(){
  var qName = document.getElementById('search-name').value.trim().toLowerCase();
  var qChannel = document.getElementById('search-channel').value.trim().toLowerCase();
  var qMember = document.getElementById('search-member').value.trim().toLowerCase();
  
  if(!qName && !qChannel && !qMember){
    searchResults = null;
    selectLecturer(currentLecturer);
    return;
  }
  
  var matches = allMarkers.filter(function(d){
    var matchName = !qName || (d.name && d.name.toLowerCase().includes(qName)) ||
                               (d.city && d.city.toLowerCase().includes(qName));
    var matchChannel = !qChannel || (d.channel_mgr && d.channel_mgr.toLowerCase().includes(qChannel));
    var matchMember = !qMember || (d.members && d.members.toLowerCase().includes(qMember));
    return matchName && matchChannel && matchMember;
  });
  searchResults = matches;
  
  // Clear old markers
  markers.forEach(function(m){map.removeLayer(m)});
  if(currentPolyline) map.removeLayer(currentPolyline);
  routeArrows.forEach(function(m){map.removeLayer(m)});
  markers = [];
  routeArrows = [];
  
  matches.forEach(function(d, i){
    var color = d.isPending ? '#d35400' : (d.isWeekend ? '#c0392b' : '#1a5276');
    var r = d.isPending ? 8 : (d.isWeekend ? 9 : 7);
    var style = {radius:r, fillColor:color, color:'#fff', weight:2.5, fillOpacity:0.95};
    if(d.isPending) style.dashArray = '4,4';
    var m = L.circleMarker([d.lat, d.lon], style).addTo(map);
    m.bindPopup(d.popup);
    markers.push(m);
  });
  
  document.getElementById('stat-inst').textContent = matches.length;
  document.getElementById('stat-weekend').textContent = matches.filter(function(d){return d.isWeekend}).length;
  document.getElementById('stat-pending').textContent = matches.filter(function(d){return d.isPending}).length;
  renderList();
}

// 初始化
document.addEventListener('DOMContentLoaded', function(){
  try {
    toggleSidebar();
    renderFilters();
    selectLecturer('all');
  } catch(e) {
    console.error('Init error:', e);
  }
});
</script>
